name: Build and Upload to Huawei AppGallery
on: workflow_dispatch
env:
  FLUTTER_VERSION: "${{ vars.FLUTTER_VERSION }}"

jobs:
  android-build:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          architecture: x64
          cache: true
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('fivekmrun_app_flutter/pubspec.lock') }}
          restore-keys: pub-
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('fivekmrun_app_flutter/android/build.gradle', 'fivekmrun_app_flutter/android/app/build.gradle') }}
          restore-keys: gradle-

      - run: cd fivekmrun_app_flutter && flutter pub get
      - shell: bash
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_SECRET: ${{ secrets.STRAVA_SECRET }}
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
        run: |
          mkdir ./fivekmrun_app_flutter/lib/private && cat << EOF > ./fivekmrun_app_flutter/lib/private/secrets.dart
          const stravaSecret = '$STRAVA_SECRET';
          const stravaClientId = '$STRAVA_CLIENT_ID';
          const googleMapsKey = '$GOOGLE_MAPS_KEY'; 
          EOF

      - name: Replace Firebase config
        run: rm ./fivekmrun_app_flutter/android/app/google-services.json && echo "${{ secrets.FIREBASE_CONFIG }}" | base64 --decode > ./fivekmrun_app_flutter/android/app/google-services.json

      - name: Build APK
        run: cd fivekmrun_app_flutter && flutter build apk --release --no-shrink

      - name: Sign APK
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/keystore.jks
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore /tmp/keystore.jks -storepass '${{ secrets.KEYSTORE_PASSWORD }}' -keypass '${{ secrets.KEYSTORE_PASSWORD }}' ./fivekmrun_app_flutter/build/app/outputs/flutter-apk/app-release.apk ${{ secrets.KEYSTORE_ALIAS }}

      - name: Publish Android Artefacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: ./fivekmrun_app_flutter/build/app/outputs/flutter-apk/

      - name: Upload to Huawei AppGallery
        env:
          HUAWEI_CLIENT_ID: ${{ secrets.HUAWEI_CLIENT_ID }}
          HUAWEI_CLIENT_SECRET: ${{ secrets.HUAWEI_CLIENT_SECRET }}
          HUAWEI_APP_ID: ${{ secrets.HUAWEI_APP_ID }}
        run: |
          pip3 install requests --quiet
          python3 - <<'EOF'
          import os, hashlib, requests

          client_id = os.environ['HUAWEI_CLIENT_ID']
          client_secret = os.environ['HUAWEI_CLIENT_SECRET']
          app_id = os.environ['HUAWEI_APP_ID']
          apk_path = './fivekmrun_app_flutter/build/app/outputs/flutter-apk/app-release.apk'
          domain = 'https://connect-api.cloud.huawei.com/api'

          # Get access token
          token_resp = requests.post(f'{domain}/oauth2/v1/token', json={
              'client_id': client_id, 'client_secret': client_secret, 'grant_type': 'client_credentials',
          })
          token_resp.raise_for_status()
          access_token = token_resp.json()['access_token']
          print('Token obtained successfully')

          # Get upload URL
          file_name = os.path.basename(apk_path)
          file_size = os.path.getsize(apk_path)
          sha256 = hashlib.sha256(open(apk_path,'rb').read()).hexdigest()
          headers = {'Authorization': f'Bearer {access_token}', 'client_id': client_id}
          url_resp = requests.get(f'{domain}/publish/v2/upload-url/for-obs', params={
              'appId': app_id, 'fileName': file_name, 'sha256': sha256,
              'contentLength': file_size, 'releaseType': 1,
          }, headers=headers)
          url_resp.raise_for_status()
          upload_info = url_resp.json()['urlInfo']
          print('Upload URL obtained')

          # Upload file to OBS
          with open(apk_path, 'rb') as f:
              obs_resp = requests.put(upload_info['url'], data=f, headers=upload_info['headers'])
          obs_resp.raise_for_status()
          print('File uploaded to OBS')

          # Commit the release
          commit_resp = requests.post(f'{domain}/publish/v2/app-file-info/update', json={
              'fileType': 5,
              'files': [{'fileName': file_name, 'fileDestUrl': upload_info['url'].split('?')[0], 'size': file_size, 'sha256': sha256}],
          }, params={'appId': app_id}, headers={**headers, 'Content-Type': 'application/json'})
          print(f'Commit response: {commit_resp.status_code} {commit_resp.text}')
          commit_resp.raise_for_status()
          print('Upload committed successfully')
          EOF
