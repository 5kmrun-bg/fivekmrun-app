name: continuous-integration-build
on:
  pull_request:
    branches: [master]
env:
  FLUTTER_VERSION: "${{ vars.FLUTTER_VERSION }}"
jobs:
  build-android:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          architecture: x64
      - run: cd fivekmrun_app_flutter && flutter pub get
      - shell: bash
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_SECRET: ${{ secrets.STRAVA_SECRET }}
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
        run: |
          mkdir ./fivekmrun_app_flutter/lib/private && cat << EOF > ./fivekmrun_app_flutter/lib/private/secrets.dart
          const stravaSecret = "$STRAVA_SECRET";
          const stravaClientId = "$STRAVA_CLIENT_ID";
          const googleMapsKey = "$GOOGLE_MAPS_KEY"; 
          EOF
      - run: cd fivekmrun_app_flutter && flutter build appbundle --no-shrink
      - name: Run Unit Tests
        run: cd fivekmrun_app_flutter && flutter test
  build-ios:
    runs-on: macos-latest
    environment: development
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          architecture: x64
      - run: cd fivekmrun_app_flutter && flutter pub get
      - shell: bash
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_SECRET: ${{ secrets.STRAVA_SECRET }}
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
        run: |
          mkdir ./fivekmrun_app_flutter/lib/private && cat << EOF > ./fivekmrun_app_flutter/lib/private/secrets.dart
          const stravaSecret = "$STRAVA_SECRET";
          const stravaClientId = "$STRAVA_CLIENT_ID";
          const googleMapsKey = "$GOOGLE_MAPS_KEY";
          EOF
      - name: Generate Apple Wallet pass signing material
        env:
          IOS_PASS_SIGNING_KEY_BASE64: ${{ secrets.IOS_PASS_SIGNING_KEY_BASE64 }}
          IOS_PASS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_PASS_CERTIFICATE_PASSWORD }}
          IOS_PASS_CERTIFICATE_BASE64: ${{ secrets.IOS_PASS_CERTIFICATE_BASE64 }}
        run: |
          cat << EOF > ./fivekmrun_app_flutter/ios/Runner/PassSecrets.swift
          import Foundation
          enum PassSecrets {
              static let privateKeyBase64 = "$IOS_PASS_SIGNING_KEY_BASE64"
              static let p12Passphrase = "$IOS_PASS_CERTIFICATE_PASSWORD"
          }
          EOF
          echo -n "$IOS_PASS_CERTIFICATE_BASE64" | base64 --decode > ./fivekmrun_app_flutter/ios/Runner/pass_certificate.p12
      - run: cd fivekmrun_app_flutter && flutter build ios --release --no-codesign
      - name: Run Unit Tests
        run: cd fivekmrun_app_flutter && flutter test
