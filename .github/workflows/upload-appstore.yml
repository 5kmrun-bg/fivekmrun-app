name: Build and Upload to Apple App Store
on: workflow_dispatch
env:
  FLUTTER_VERSION: "${{ vars.FLUTTER_VERSION }}"

jobs:
  ios-build:
    runs-on: macos-26
    environment: production
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v1
        with:
          p12-file-base64: ${{ secrets.IOS_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}
      - name: Install the provisioning profile
        env:
          PROVISIONING_CERTIFICATE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision

          echo -n "$PROVISIONING_CERTIFICATE_BASE64" | base64 --decode -o $PP_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - shell: bash
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_SECRET: ${{ secrets.STRAVA_SECRET }}
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
        run: |
          mkdir ./fivekmrun_app_flutter/lib/private && cat << EOF > ./fivekmrun_app_flutter/lib/private/secrets.dart
          const stravaSecret = "$STRAVA_SECRET";
          const stravaClientId = "$STRAVA_CLIENT_ID";
          const googleMapsKey = "$GOOGLE_MAPS_KEY"; 
          EOF
      - name: Replace Firebase config
        run: rm ./fivekmrun_app_flutter/ios/GoogleService-Info.plist && echo -n "${{ vars.FIREBASE_PLIST }}" > ./fivekmrun_app_flutter/ios/GoogleService-Info.plist

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: fivekmrun_app_flutter/ios/Pods
          key: pods-${{ hashFiles('fivekmrun_app_flutter/ios/Podfile.lock') }}
          restore-keys: pods-
      - name: "Install Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          architecture: x64
          cache: true
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('fivekmrun_app_flutter/pubspec.lock') }}
          restore-keys: pub-
      - name: "Install Flutter dependencies"
        run: cd fivekmrun_app_flutter && flutter pub get

      - name: Build Flutter
        run: cd fivekmrun_app_flutter && flutter build ios --release --no-codesign
      - name: Build resolve Swift dependencies
        run: xcodebuild -resolvePackageDependencies -workspace fivekmrun_app_flutter/ios/Runner.xcworkspace -scheme Runner -configuration Release
      - name: Build xArchive
        run: |
          xcodebuild -workspace fivekmrun_app_flutter/ios/Runner.xcworkspace -scheme Runner -configuration Release DEVELOPMENT_TEAM=48HKWHQ6FS -sdk 'iphoneos' -destination 'generic/platform=iOS' -archivePath build-output/app.xcarchive PROVISIONING_PROFILE=0258673b-a8aa-43be-ab3c-97f5617fe07f clean archive CODE_SIGN_IDENTITY="Apple Distribution: 5 KM PARK BG (48HKWHQ6FS)"
      - name: Create export options plist
        run: |
          echo -n "${{ vars.IOS_EXPORT_OPTIONS }}" > $RUNNER_TEMP/exportOptions.plist
          echo "Created export options plist: $RUNNER_TEMP/exportOptions.plist"
      - name: Export ipa
        run: xcodebuild -exportArchive -archivePath build-output/app.xcarchive -exportPath build-output/ios -exportOptionsPlist $RUNNER_TEMP/exportOptions.plist
      - name: Publish iOS Artefacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: release-ios
          path: build-output/ios
      - name: "Upload app to TestFlight"
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: "build-output/ios/5kmRun.bg.ipa"
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
      - name: Create App Store draft version
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          # --break-system-packages: the runner's Homebrew Python is marked
          # externally managed (PEP 668), which makes a plain install abort.
          # Safe here — the runner is discarded after the job.
          pip3 install PyJWT cryptography --quiet --break-system-packages
          export VERSION=$(grep '^version:' fivekmrun_app_flutter/pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          python3 - <<EOF
          import jwt, time, json, urllib.request, urllib.error, os, sys

          key_id = os.environ['APPSTORE_API_KEY_ID']
          issuer_id = os.environ['APPSTORE_ISSUER_ID']
          private_key = os.environ['APPSTORE_API_PRIVATE_KEY']
          version = os.environ['VERSION']

          token = jwt.encode(
              {'iss': issuer_id, 'iat': int(time.time()), 'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'},
              private_key, algorithm='ES256', headers={'kid': key_id}
          )
          headers = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}

          def api(method, path, body=None):
              req = urllib.request.Request(
                  f'https://api.appstoreconnect.apple.com{path}',
                  data=json.dumps(body).encode() if body else None,
                  headers=headers, method=method
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          # Look up app by bundle ID
          apps = api('GET', '/v1/apps?filter[bundleId]=bg.5kmpark.5kmrun&fields[apps]=id,name')
          app_id = apps['data'][0]['id']
          print(f'App ID: {app_id}')

          # Create draft version (or get existing)
          version_id = None
          try:
              result = api('POST', '/v1/appStoreVersions', {'data': {
                  'type': 'appStoreVersions',
                  'attributes': {'platform': 'IOS', 'versionString': version},
                  'relationships': {'app': {'data': {'type': 'apps', 'id': app_id}}}
              }})
              version_id = result['data']['id']
              print(f'Draft version {version} created: {version_id}')
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              if 'VERSION_ALREADY_EXIST' in body or 'already exists' in body.lower():
                  print(f'Version {version} already exists, fetching id...')
                  existing = api('GET', f'/v1/apps/{app_id}/appStoreVersions?filter[versionString]={version}&filter[platform]=IOS')
                  version_id = existing['data'][0]['id']
              else:
                  print(f'Error creating draft version: {body}')
                  sys.exit(1)

          # Read whatsnew files
          locale_map = {'en-GB': 'whatsnew/whatsnew-en-GB', 'bg': 'whatsnew/whatsnew-bg'}
          whatsnew = {}
          for locale, path in locale_map.items():
              try:
                  with open(path) as f:
                      whatsnew[locale] = f.read().strip()
              except FileNotFoundError:
                  print(f'No whatsnew file for {locale}, skipping.')

          # Set whatsNew on each localization
          locs = api('GET', f'/v1/appStoreVersions/{version_id}/appStoreVersionLocalizations')
          existing_locales = {l['attributes']['locale']: l['id'] for l in locs['data']}

          for locale, text in whatsnew.items():
              if locale in existing_locales:
                  api('PATCH', f'/v1/appStoreVersionLocalizations/{existing_locales[locale]}', {'data': {
                      'type': 'appStoreVersionLocalizations',
                      'id': existing_locales[locale],
                      'attributes': {'whatsNew': text}
                  }})
                  print(f'Updated whatsNew for {locale}')
              else:
                  api('POST', '/v1/appStoreVersionLocalizations', {'data': {
                      'type': 'appStoreVersionLocalizations',
                      'attributes': {'locale': locale, 'whatsNew': text},
                      'relationships': {'appStoreVersion': {'data': {'type': 'appStoreVersions', 'id': version_id}}}
                  }})
                  print(f'Created whatsNew for {locale}')
          EOF
